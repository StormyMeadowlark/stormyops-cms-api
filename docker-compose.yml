services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "2025:2025"
    env_file:
      - .env.local
    depends_on:
      - redis
    command: node dist/server.js

  worker:
    build: .
    env_file:
      - .env.local
    depends_on:
      - redis
    command: node dist/worker.js